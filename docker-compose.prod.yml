# ----------------------------------------------------
# PRODUCTION DOCKER COMPOSE
#
# Runs BOTH services (weight + billing) together with
# their databases on a shared network.
#
# Unlike the dev/e2e compose files:
#   - Uses persistent named volumes (data survives restarts)
#   - restart: always (containers auto-restart on crash)
#   - No test volumes, no debug mounts
#   - Reads credentials from .env files
#   - Billing talks to weight via internal Docker hostname
#
# Usage:
#   docker compose -f docker-compose.prod.yml up --build -d
#
# Ports exposed on the host:
#   - 80   → weight app
#   - 8090 → billing app
#   (DB ports are NOT exposed — only accessible inside Docker)
# ----------------------------------------------------

services:

  # ---- weight database ----
  # MySQL database for the weight service.
  # Initialized on first run with weightdb.sql.
  # Data persists in a named volume across restarts.
  weight-db:
    image: mysql:9.0.1-oraclelinux9
    container_name: prod-weight-db
    env_file:
      - ./weight/.env
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USER}", "-p${DB_PASSWORD}"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - weight-db-data:/var/lib/mysql
      - ./weight/db/weightdb.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  # ---- weight app ----
  # Flask app serving the weight API on port 5000 inside
  # the container, mapped to port 80 on the host.
  # Waits for weight-db to be healthy before starting.
  weight-app:
    build:
      context: ./weight
      dockerfile: Dockerfile.weight.dev
    container_name: prod-weight-app
    env_file:
      - ./weight/.env
    environment:
      DB_HOSTNAME: weight-db
    ports:
      - "80:5000"
    depends_on:
      weight-db:
        condition: service_healthy
    restart: always

  # ---- billing database ----
  # MariaDB database for the billing service.
  # Initialized on first run with billdb.sql.
  # Data persists in a named volume across restarts.
  billing-db:
    image: mariadb:10.11
    container_name: prod-billing-db
    env_file:
      - ./billing/.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - billing-db-data:/var/lib/mysql
      - ./billing/db/billdb.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  # ---- billing app ----
  # Flask app serving the billing API on port 5000 inside
  # the container, mapped to port 8090 on the host.
  # Talks to weight-app internally via Docker hostname.
  # Waits for billing-db to be healthy and weight-app to start.
  billing-app:
    build:
      context: ./billing
    container_name: prod-billing-app
    env_file:
      - ./billing/.env
    environment:
      DB_HOST: billing-db
      WEIGHT_SERVER_URL: http://weight-app:5000
    ports:
      - "8090:5000"
    depends_on:
      billing-db:
        condition: service_healthy
      weight-app:
        condition: service_started
    restart: always

# ----------------------------------------------------
# NAMED VOLUMES
# Persistent storage for both databases.
# Data survives container restarts and rebuilds.
# Only destroyed if you explicitly run:
#   docker compose -f docker-compose.prod.yml down -v
# ----------------------------------------------------
volumes:
  weight-db-data:
  billing-db-data:
