services:
  weight-db:
    image: mysql:9.0.1-oraclelinux9
    healthcheck:
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./weight/db/weightdb.sql:/docker-entrypoint-initdb.d/init.sql

  weight-app:
    build:
      context: ./weight
      dockerfile: Dockerfile.weight.dev
    environment:
      DB_HOSTNAME: weight-db
    depends_on:
      weight-db:
        condition: service_healthy

  billing-db:
    image: mariadb:10.11
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./billing/db/billdb.sql:/docker-entrypoint-initdb.d/init.sql

  billing-app:
    build:
      context: ./billing
    environment:
      DB_HOST: billing-db
      WEIGHT_SERVER_URL: http://weight-app:5000
    depends_on:
      billing-db:
        condition: service_healthy
      weight-app:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      WEIGHT_URL: http://weight-app:5000
      BILLING_URL: http://billing-app:5000
    depends_on:
      - weight-app
      - billing-app
