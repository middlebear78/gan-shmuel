services:
  mysql:
    image: mariadb:10.11
    container_name: billing-mysql
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - billing-mysql_data:/var/lib/mysql
      - ./db/billdb.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  billing-app:
    build: .
    env_file:
      - .env
    ports:
      - "8090:5000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      -./in:/app/in
volumes:
  billing-mysql_data:
